<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hello, AGOL!</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />

  <!-- calls for the arcgis api's CSS file and JS library. -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

  <!-- Adding the modules, API key, and map constant needed for a full screen map app -->
  <script>
  
    require([
     "esri/config",
      "esri/Map",
      "esri/views/MapView",
      "esri/Graphic",  
      "esri/layers/GraphicsLayer",
      "esri/layers/FeatureLayer"
    ], function (esriConfig,Map, MapView, Graphic, GraphicsLayer, FeatureLayer) {

      esriConfig.apiKey = "AAPTajaiUN-l-Y5iZ6SJzRW2TrA..m77zVLz8qGj9i_I3EY3F8Xk6dn3B8qdgfg-gOj71TjVV0cBg24kogjcanRc9hB0dnx2U2BVXAfF6qmCt697nFz41ku7Bmh73aBA42Pt3g7XTB8Z1Rj8LRsDBEQ4Qsp31xAZOIgb3xBoPBYjxJRca-8kLvUpoJ_uxScDUo_4op0o82q-5JsDlBhmU9bmuS4UrJkatYMvgHQ1soi97xgxRQ3Rbaf00hwvocEDURchwXnW5OwAp51YxA3-fxQII21enwUGK2dPaWSRFWFVJ-ijkeg..AT1_bryZT1WS";
      const map = new Map({
        basemap: "arcgis-topographic" // Basemap layer
      });

      const view = new MapView({
          map: map,
          center: [-97.7431, 30.2672], // Longitude, latitude
          zoom: 13, // Zoom level
          container: "viewDiv" // Div element
        });

        const graphicsLayer = new GraphicsLayer();
        map.add(graphicsLayer);

        const point = {
          type: "point",
          longitude: -97.74035,
          latitude: 30.27466
        };

        const simpleMarkerSymbol = {
          type: "simple-marker",
          color: [255, 215, 0], // Gold color
          style: "diamond",
          outline: {
            color: [255, 255, 255], // White
            width: 1
          },
          size: "16px"
        };

        const popupTemplate = {
          title: "{Name}",
          content: "The Texas State Capitol is located in Austin, Texas."
        };

        const attributes = {
          Name: "Texas State Capitol"
        };

        const pointGraphic = new Graphic({
          geometry: point,
          symbol: simpleMarkerSymbol,
          attributes: attributes,
          popupTemplate: popupTemplate
        });

        graphicsLayer.add(pointGraphic);

        const airportsLayerUrl = "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/Airports_NA/FeatureServer";
        const airportIconUrl = "https://raw.githubusercontent.com/Nii-26/agol/main/local_airport_24dp_1F1F1F.png"; // GitHub icon source

        const airportRenderer = {
          type: "simple",
          symbol: {
            type: "picture-marker",
            url: airportIconUrl,
            width: "18px",
            height: "18px"
          }
        };

        const airportLabels = {
          symbol: {
            type: "text",
            color: "#FFFFFF",
            haloColor: "#5ED74",
            haloSize: "2px",
            font: {
              size: "12px",
              family: "Noto Sans",
              style: "italic",
              weight: "normal"
            }
          },
          labelPlacement: "above-center",
          labelExpressionInfo: {
            expression: "$feature.Fac_Name"
          }
        };

        const airportLayer = new FeatureLayer({
          url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/US_Airports/FeatureServer",
          renderer: airportRenderer,
          definitionExpression: "Fac_Type = 'AIRPORT'",
          labelingInfo: [airportLabels]
        });

        map.add(airportLayer);

        const popupLaw = {
          title: "{NAME}",
          content: "<div style=\"font-family: Arial, Helvetica, sans-serif;\">"
            + "<p style=\"margin:0 0 6px 0;\"><b>Address:</b> {ADDRESS}</p>"
            + "<p style=\"margin:0 0 6px 0;\"><b>City/State:</b> {CITY}, {STATE} {ZIPCODE}</p>"
            + "<p style=\"margin:0 0 6px 0;\"><b>Permanent ID:</b> {PERMANENT_IDENTIFIER}</p>"
            + "<p style=\"margin:0;\"><a target=\"_blank\" href=\"https://www.google.com/maps/search/{ADDRESS}\">Open in Google Maps</a></p>"
            + "</div>"
        };

        const usaeduLayer = new FeatureLayer({
          url: "https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/Structures_Law_Enforcement_v1/FeatureServer",
          outFields: ["NAME", "ADDRESS", "CITY", "STATE", "ZIPCODE", "PERMANENT_IDENTIFIER"],
          popupTemplate: popupLaw
        });

        map.add(usaeduLayer);
    });
  </script>

  <!-- css to make a full screen map -->
  <style>
    html,
    body,
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
    /* Popup styling: rounded corners and subtle shadow */
    .esri-popup__main-container,
    .esri-popup__wrapper {
      border-radius: 10px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35) !important;
      overflow: hidden;
    }
    .esri-popup__content {
      border-radius: 8px !important;
    }
    .esri-popup__header {
      border-bottom: 1px solid rgba(0,0,0,0.06) !important;
    }
  </style>

</head>
<body>

  <!-- the div to displays the map  -->
  <div id="viewDiv"></div>

</body>
</html>
